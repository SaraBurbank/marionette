<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            position: relative;
            background: #343131;
        }

        /* Matter.js canvas — bottom layer */
        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 0;
        }

        /* SVG character — above canvas, below UI */
        #character-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: visible;
        }
    </style>
    <title>Marionete</title>
</head>
<body>
    <!-- GSAP Version used: gsap@3.15 | Matter.js Version used: matter-js 0.20.0  -->
    <script src="./lib/gsap.min.js"></script> 
    <script src="./lib/matter.min.js"></script>
    <script src="./src/main.js" type="module"></script>
</body>
</html>
